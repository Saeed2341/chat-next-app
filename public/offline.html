<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عدم اتصال</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: #0b141a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #8696a0;
            margin-bottom: 30px;
        }
        button {
            background: #00a884;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #008f6f;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>عدم اتصال به اینترنت</h1>
        <p>لطفاً اتصال اینترنت خود را بررسی کنید</p>
        <button onclick="window.location.reload()">تلاش مجدد</button>
    </div>
</body>
</html>
